apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  workflow_dispatch:
metadata:
  stages/v1alpha1:
    - name: Stage 1
      jobs:
        - job1
        - job2
        - job3
jobs:
  job1:
    runs-on: my-label-1
    steps:
      - run: echo "hello world"
        uses: docker://golang:1.20.3-alpine3.17
        name: Hello world
        shell: sh
  job2:
    needs: job1
    runs-on: os:darwin
    steps:
      - run: echo "hello"
        uses: docker://golang:1.20.3-alpine3.17
        name: hi
        shell: sh
  job3:
    needs:
      - job2
    runs-on:
      - my-label-2
      - os:darwin
      - arch:arm64
      - my-label-1
      - new-label
    steps:
      - run: echo "hello"
        uses: docker://golang:1.20.3-alpine3.17
        name: hello
        shell: sh
