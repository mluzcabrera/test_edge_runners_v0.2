apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Timeouts tekton 2
on:
  workflow_dispatch:
jobs:
  build:
    steps:
      - name: Say hello
        uses: docker://golang:1.20.3-alpine3.17
        id: hello-step
        timeout-minutes: 1
        shell: sh
        run: |
          sleep 240
          echo "hello world MLCB"
          echo "Environment: $ENVIRONMENT"
          echo "App version: $APP_VERSION"
        env:
          ENVIRONMENT: staging
          APP_VERSION: 1.0.0
          BUILD_TYPE: release
