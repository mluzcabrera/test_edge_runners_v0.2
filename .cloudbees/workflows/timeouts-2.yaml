apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Timeouts 2
on:
  workflow_dispatch:
jobs:
  build:
    runs-on:
      - my-label-1
      - os:darwin
    steps:
      - name: Say hello
        id: hello-step
        timeout-minutes: 1
        shell: sh
        env:
          ENVIRONMENT: "staging"
          APP_VERSION: "1.0.0"
          BUILD_TYPE: "release"
        run: |
          sleep 240
          echo "hello world MLCB"
          echo "Environment: $ENVIRONMENT"
          echo "App version: $APP_VERSION"
