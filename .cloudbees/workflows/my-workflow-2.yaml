apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: My workflow
on:
  workflow_dispatch:
jobs:
  fail-immediately:
    needs: run_normally
    runs-on:
      - my-label-cacacaca
      - os:darwin
    steps:
      - name: Say hello
        id: hello-step
        shell: sh
        env:
          ENVIRONMENT: "staging"
          APP_VERSION: "1.0.0"
          BUILD_TYPE: "release"
        run: |
          echo "hello world MLCB"
          echo "Environment: $ENVIRONMENT"
          echo "App version: $APP_VERSION"
  run_normally:
    runs-on:
      - my-label-1
      - os:darwin
    steps:
      - name: Say hello
        id: hello-step
        shell: sh
        env:
          ENVIRONMENT: "staging"
          APP_VERSION: "1.0.0"
          BUILD_TYPE: "release"
        run: |
          echo "hello world MLCB"
          echo "Environment: $ENVIRONMENT"
          echo "App version: $APP_VERSION"
